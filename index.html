  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      display: flex;

    p.subtitle {

      font-size: 1.05rem;
    }

    .links {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .links a {
      display: block;
      text-decoration: none;
      background: white;
      color: #0f172a;
      padding: 14px 18px;
      border-radius: 12px;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .footer {
      margin-top: 24px;
      font-size: 0.95rem;
